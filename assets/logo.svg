<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-label="shellmux — race-free timed delivery in shell">
  <title>shellmux</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f27"/>
      <stop offset="1" stop-color="#11141a"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    </style>
  </defs>

  <!-- terminal window -->
  <rect x="8" y="8" width="744" height="224" rx="14" fill="url(#bg)" stroke="#2b313c" stroke-width="1.5"/>

  <!-- titlebar dots -->
  <circle cx="40"  cy="40" r="7" fill="#ff5f56"/>
  <circle cx="64"  cy="40" r="7" fill="#ffbd2e"/>
  <circle cx="88"  cy="40" r="7" fill="#27c93f"/>
  <text x="376" y="45" text-anchor="middle" class="mono" font-size="14" fill="#5b6472">— shellmux —</text>

  <!-- prompt line: the wordmark -->
  <text x="40" y="128" class="mono" font-size="46" font-weight="700">
    <tspan fill="#27c93f">$</tspan><tspan fill="#cfd6e0"> shellmux</tspan><tspan class="cursor" fill="#27c93f" dx="6">▮</tspan>
  </text>

  <!-- tagline -->
  <text x="42" y="172" class="mono" font-size="19" fill="#8b94a3">race-free timed delivery, proven in shell</text>

  <!-- proof badge line -->
  <text x="42" y="204" class="mono" font-size="14.5" fill="#5b6472">missed=0  dup=0  over N=5000  ·  ~0% idle CPU  ·  no timer wheel</text>
</svg>
